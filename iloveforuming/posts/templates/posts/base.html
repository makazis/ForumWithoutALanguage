<!-- posts/templates/posts/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forum Without a Language{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'posts/components/navbar.html' %}
    
    <main class="container">
        {% include 'posts/components/messages.html' %}
        {% block content %}{% endblock %}
    </main>
    
    <script>
        
        window.symbolSequence = [];
        
        function addSymbol(code) {
            window.symbolSequence.push(code);
            updateSymbolPreview();
            updateHiddenInput();
        }
        
        function removeLastSymbol() {
            window.symbolSequence.pop();
            updateSymbolPreview();
            updateHiddenInput();
        }
        
        function clearAllSymbols() {
            window.symbolSequence = [];
            updateSymbolPreview();
            updateHiddenInput();
        }
        
        function updateSymbolPreview() {
            const previewDiv = document.getElementById('symbol-preview');
            if (!previewDiv) return;
            
            if (window.symbolSequence.length === 0) {
                previewDiv.innerHTML = '<span class="text-gray-400">Click symbols to build your message</span>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < window.symbolSequence.length; i++) {
                const code = window.symbolSequence[i];
                html += `<img src="/static/symbols/symbol_${code}.png" class="symbol-img-sm inline-block m-1" alt="${code}">`;
            }
            previewDiv.innerHTML = html;
        }
        
        function updateHiddenInput() {
            const hiddenInput = document.getElementById('symbol_sequence');
            if (hiddenInput) {
                hiddenInput.value = window.symbolSequence.join('');
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
