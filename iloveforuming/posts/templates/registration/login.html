<!-- posts/templates/registration/login.html -->
{% extends 'posts/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Login to the Bable</h1>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" required class="form-input" autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" required class="form-input">
            </div>
            
            {% if form.errors %}
                <div class="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}
            
            <button type="submit" class="btn btn-primary btn-lg btn-block">
                Login
            </button>
        </form>
        
        <div class="text-center mt-3 text-gray-500 text-sm">
            Don't have an account? Contact an administrator.
        </div>
    </div>
</div>
{% endblock %}
